<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #eeeeee;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
    }

    nav {
      margin-bottom: 20px;
    }

    nav a {
      margin-right: 12px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    nav a:hover {
      text-decoration: underline;
    }

    nav a.active {
      font-weight: bold;
    }

    .markdown-body {
      background: transparent;
    }

    .markdown-body ul {
      list-style: disc;
      padding-left: 2em;
    }

    .markdown-body li {
      margin: 0.25em 0;
    }

    .markdown-body li > p {
      margin: 0;
    }

    #filters button {
      border: 1px solid #ddd;
      background: #eee;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 6px;
    }

    #filters button:hover {
      background: #ddd;
    }

    #filters button.active {
      background: #ccc;
      font-weight: bold;
    }

    #loadMore {
      padding: 8px 14px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #loadMore:hover {
      background: #f5f5f5;
    }

    .post-count{
      font-size:10px;
      color:#aaa;
      margin-bottom:10px;
    }
  </style>
</head>
<body>

<div class="container">

  <nav>
    <a href="/" class="{% if page.url == '/' %}active{% endif %}">Blog</a> |
    <a href="/cheatsheets/" class="{% if page.url contains '/cheatsheets' %}active{% endif %}">Cheatsheets</a> |
    <a href="/about/" class="{% if page.url contains '/about' %}active{% endif %}">About</a>
  </nav>

  <hr>

  <div class="markdown-body">
    {{ content }}
  </div>

</div>

</body>
</html>
