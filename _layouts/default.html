<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- GitHub Markdown styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
    }

    nav {
      margin-bottom: 20px;
    }

    nav a {
      margin-right: 12px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Markdown content styling */
    .markdown-body {
      background: transparent;
    }

    /* Filters (blog UI only) */
    #filters button {
      border: 1px solid #ddd;
      background: #eee;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 6px;
    }

    #filters button:hover {
      background: #ddd;
    }

    /* Active filter (JS-controlled) */
    #filters button.active {
      background: #ccc;
      font-weight: bold;
    }

    /* Load more button */
    #loadMore {
      padding: 8px 14px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #loadMore:hover {
      background: #f5f5f5;
    }
  </style>
</head>
<body>

<div class="container">

  <nav>
    <a href="/" style="font-weight: bold;">Blog</a> |
    <a href="/cheatsheets/">Cheatsheets</a> |
    <a href="/about/">About</a>
  </nav>

  <hr>

  <!-- Markdown content wrapper -->
  <div class="markdown-body">
    {{ content }}
  </div>

</div>

</body>
</html>
