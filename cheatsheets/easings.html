<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easings</title>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 40px;
}

h1 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 12px;
}

canvas {
  width: 100%;
  height: 140px;
  display: block;
}

.name {
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
}

.controls {
  margin-top: 30px;
  padding: 16px;
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  cursor: pointer;
}

button.active {
  background: #6c5ce7;
  color: white;
}
</style>
</head>

<body>

<h1>Easing Functions</h1>

<div class="grid" id="grid"></div>

<div class="controls">
  <div>
    <strong>Visualization:</strong>
    <button id="moveBtn" class="active">Move</button>
    <button id="scaleBtn">Scale</button>
    <button id="rotateBtn">Rotate</button>
    <button id="colorBtn">Color</button>
  </div>

  <div>
    <strong>Duration:</strong>
    <input type="range" id="duration" min="0.5" max="3" step="0.1" value="1.5">
    <span id="durationLabel">1.5s</span>
  </div>

  <div>
    <strong>Loop:</strong>
    <button id="loopBtn" class="active">Loop</button>
    <button id="pingBtn">Ping-Pong</button>
  </div>
</div>

<script>
const easings = {

  Linear: t => t,

  InSine: t => 1 - Math.cos((t * Math.PI) / 2),
  OutSine: t => Math.sin((t * Math.PI) / 2),
  InOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,

  InQuad: t => t * t,
  OutQuad: t => t * (2 - t),
  InOutQuad: t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2)/2,

  InCubic: t => t * t * t,
  OutCubic: t => 1 - Math.pow(1 - t, 3),
  InOutCubic: t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2,

  InQuart: t => t * t * t * t,
  OutQuart: t => 1 - Math.pow(1 - t, 4),
  InOutQuart: t => t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t + 2, 4)/2,

  InQuint: t => t * t * t * t * t,
  OutQuint: t => 1 - Math.pow(1 - t, 5),
  InOutQuint: t => t < 0.5 ? 16*t*t*t*t*t : 1 - Math.pow(-2*t + 2, 5)/2,

  InExpo: t => t === 0 ? 0 : Math.pow(2, 10*t - 10),
  OutExpo: t => t === 1 ? 1 : 1 - Math.pow(2, -10*t),
  InOutExpo: t =>
    t === 0 ? 0 :
    t === 1 ? 1 :
    t < 0.5
      ? Math.pow(2, 20*t - 10)/2
      : (2 - Math.pow(2, -20*t + 10))/2,

  InCirc: t => 1 - Math.sqrt(1 - Math.pow(t, 2)),
  OutCirc: t => Math.sqrt(1 - Math.pow(t - 1, 2)),
  InOutCirc: t =>
    t < 0.5
      ? (1 - Math.sqrt(1 - Math.pow(2*t, 2))) / 2
      : (Math.sqrt(1 - Math.pow(-2*t + 2, 2)) + 1) / 2,

  InBack: t => {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return c3*t*t*t - c1*t*t;
  },
  OutBack: t => {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return 1 + c3*Math.pow(t - 1, 3) + c1*Math.pow(t - 1, 2);
  },
  InOutBack: t => {
    const c1 = 1.70158;
    const c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2*t, 2) * ((c2 + 1)*2*t - c2)) / 2
      : (Math.pow(2*t - 2, 2) * ((c2 + 1)*(t*2 - 2) + c2) + 2) / 2;
  },

  InElastic: t => {
    const c4 = (2 * Math.PI) / 3;
    return t === 0 ? 0 :
           t === 1 ? 1 :
           -Math.pow(2, 10*t - 10) * Math.sin((t*10 - 10.75)*c4);
  },
  OutElastic: t => {
    const c4 = (2 * Math.PI) / 3;
    return t === 0 ? 0 :
           t === 1 ? 1 :
           Math.pow(2, -10*t) * Math.sin((t*10 - 0.75)*c4) + 1;
  },
  InOutElastic: t => {
    const c5 = (2 * Math.PI) / 4.5;
    return t === 0 ? 0 :
           t === 1 ? 1 :
           t < 0.5
             ? -(Math.pow(2, 20*t - 10) * Math.sin((20*t - 11.125)*c5)) / 2
             : (Math.pow(2, -20*t + 10) * Math.sin((20*t - 11.125)*c5)) / 2 + 1;
  },

  OutBounce: t => {
    const n1 = 7.5625;
    const d1 = 2.75;

    if (t < 1/d1) return n1*t*t;
    if (t < 2/d1) return n1*(t -= 1.5/d1)*t + 0.75;
    if (t < 2.5/d1) return n1*(t -= 2.25/d1)*t + 0.9375;
    return n1*(t -= 2.625/d1)*t + 0.984375;
  },

  InBounce: t => 1 - easings.OutBounce(1 - t),

  InOutBounce: t =>
    t < 0.5
      ? (1 - easings.OutBounce(1 - 2*t)) / 2
      : (1 + easings.OutBounce(2*t - 1)) / 2
};

function flashCore(t, count, power) {
  if (t === 0 || t === 1) return t;

  const step = Math.floor(t * count);
  const progress = (t * count) - step;

  const direction = step % 2 === 0 ? 1 : -1;

  return direction > 0
    ? Math.pow(progress, power)
    : 1 - Math.pow(progress, power);
}

easings.Flash = t => flashCore(t, 3, 1);

easings.InFlash = t => t * flashCore(t, 3, 1);

easings.OutFlash = t => (1 - t) * flashCore(t, 3, 1) + t;

easings.InOutFlash = t => {
  if (t < 0.5) {
    return 0.5 * (t * 2) * flashCore(t * 2, 3, 1);
  } else {
    return 0.5 + 0.5 * ((1 - (t - 0.5) * 2) * flashCore((t - 0.5) * 2, 3, 1));
  }
};


let flags = {
  move: true,
  scale: false,
  rotate: false,
  color: false
};

let durationValue = 1.5;
let loopType = "loop";

const grid = document.getElementById("grid");
const items = [];

Object.entries(easings).forEach(([name, fn]) => {
  const card = document.createElement("div");
  card.className = "card";

  const canvas = document.createElement("canvas");
  const label = document.createElement("div");

  label.className = "name";
  label.textContent = name;

  card.appendChild(canvas);
  card.appendChild(label);
  grid.appendChild(card);

  items.push({ canvas, fn });
});

function draw(canvas, fn, time) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = canvas.offsetHeight;

  const pad = 20;

  ctx.clearRect(0,0,w,h);

  // axes
  ctx.strokeStyle = "#bbb";
  ctx.lineWidth = 1;

  ctx.beginPath();
  ctx.moveTo(pad, h - pad);
  ctx.lineTo(w - pad, h - pad);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(pad, h - pad);
  ctx.lineTo(pad, pad);
  ctx.stroke();

  ctx.fillStyle = "#888";
  ctx.font = "10px sans-serif";
  ctx.fillText("t", w - pad + 4, h - pad + 10);
  ctx.fillText("x", pad - 10, pad - 4);

  // curve
  ctx.strokeStyle = "#6c5ce7";
  ctx.lineWidth = 2;

  ctx.beginPath();
  for (let i=0;i<=100;i++) {
    const t = i/100;
    const x = pad + t*(w - 2*pad);
    const y = h - pad - fn(t)*(h - 2*pad);
    if (i === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // normalized time
  let tNorm;

  if (loopType === "loop") {
    tNorm = (time / durationValue) % 1;
  } else {
    const cycle = (time / durationValue) % 2;
    tNorm = cycle < 1 ? cycle : 2 - cycle;
  }

  const v = fn(tNorm);

  // base position
  let x = pad;
  let y = h - pad - v*(h - 2*pad);

  if (flags.move) {
    x = pad + tNorm * (w - 2 * pad);
  }

  // size
  let size = 18;

  if (flags.scale) {
    size *= (0.5 + v);
  }

  // color
  let r = 255, g = 0, b = 0;

  if (flags.color) {
    r = Math.round(255 * (1 - v));
    b = Math.round(255 * v);
  }

  ctx.save();
  ctx.translate(x, y);

  if (flags.rotate) {
    ctx.rotate(tNorm * Math.PI * 2);
  }

  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(-size/2, -size/2, size, size);

  ctx.restore();
}

let start = performance.now();

function loop(now) {
  const time = (now - start) / 1000;

  items.forEach(({canvas, fn}) => {
    draw(canvas, fn, time);
  });

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

/* controls */

function toggle(btn, key) {
  flags[key] = !flags[key];
  btn.classList.toggle("active", flags[key]);
}

moveBtn.onclick = () => toggle(moveBtn, "move");
scaleBtn.onclick = () => toggle(scaleBtn, "scale");
rotateBtn.onclick = () => toggle(rotateBtn, "rotate");
colorBtn.onclick = () => toggle(colorBtn, "color");

duration.oninput = e => {
  durationValue = parseFloat(e.target.value);
  durationLabel.textContent = durationValue.toFixed(1) + "s";
};

loopBtn.onclick = () => {
  loopType = "loop";
  loopBtn.classList.add("active");
  pingBtn.classList.remove("active");
};

pingBtn.onclick = () => {
  loopType = "ping";
  pingBtn.classList.add("active");
  loopBtn.classList.remove("active");
};
</script>

</body>
</html>
