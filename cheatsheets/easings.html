<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easings</title>

<style>
body{
  font-family:system-ui;
  background:#fafafa;
  margin:0;
  padding:30px;
}

h1{margin-bottom:20px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}

.card{
  background:white;
  border:1px solid #eee;
  border-radius:10px;
  padding:12px;
}

canvas{
  width:100%;
  height:140px;
}

.num{
  opacity:0.2;
}

.name{
  text-align:center;
  font-size:13px;
  margin-top:6px;
}

.controls{
  margin-top:25px;
  background:white;
  padding:12px;
  border-radius:10px;
  border:1px solid #eee;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.legend{
  margin-top:15px;
  display:flex;
  gap:25px;
  align-items:center;
  font-size:13px;
}

.legend span{
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#007bff;
}

.square{
  width:10px;
  height:10px;
  background:red;
}

button{
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #ddd;
  background:#f5f5f5;
  cursor:pointer;
}

button.active{
  background:#6c5ce7;
  color:white;
}

input[type="number"]{
  width:60px;
}
</style>
</head>

<body>

<h1>Easing Functions (35) Cheatsheet</h1>

<div class="grid" id="grid"></div>

<div class="controls">
  <div>
    <strong>Visualization:</strong>
    <button id="moveBtn" class="active">Move</button>
    <button id="scaleBtn">Scale</button>
    <button id="rotateBtn">Rotate</button>
    <button id="colorBtn">Color</button>
  </div>

  <div>
    <strong>Duration:</strong>
    <button onclick="setDuration(0.2)">0.2s</button>
    <button onclick="setDuration(0.5)">0.5s</button>
    <button onclick="setDuration(1)">1s</button>
    <button onclick="setDuration(2)">2s</button>
    <button onclick="setDuration(3)">3s</button>
    <input id="durationInput" type="number" step="0.1" value="1.5">
  </div>

  <div>
    <strong>Loop:</strong>
    <button id="loopBtn" class="active">Loop</button>
    <button id="pingBtn">Ping-Pong</button>
  </div>
</div>

<div class="legend">
  <span><div class="dot"></div> = curve evaluation</span>
  <span><div class="square"></div> = animated object</span>
  <span>t = time, x = value</span
</div>

<script>
const DRAW_MARGIN = 0.35;

const E={};
E.Linear=t=>t;

E.InSine=t=>1-Math.cos(t*Math.PI/2);
E.OutSine=t=>Math.sin(t*Math.PI/2);
E.InOutSine=t=>-(Math.cos(Math.PI*t)-1)/2;

E.InQuad=t=>t*t;
E.OutQuad=t=>t*(2-t);
E.InOutQuad=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

E.InCubic=t=>t*t*t;
E.OutCubic=t=>1-Math.pow(1-t,3);
E.InOutCubic=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

E.InQuart=t=>t*t*t*t;
E.OutQuart=t=>1-Math.pow(1-t,4);
E.InOutQuart=t=>t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;

E.InQuint=t=>t*t*t*t*t;
E.OutQuint=t=>1-Math.pow(1-t,5);
E.InOutQuint=t=>t<.5?16*t*t*t*t*t:1-Math.pow(-2*t+2,5)/2;

E.InExpo=t=>t===0?0:Math.pow(2,10*t-10);
E.OutExpo=t=>t===1?1:1-Math.pow(2,-10*t);
E.InOutExpo=t=>t===0?0:t===1?1:t<.5?Math.pow(2,20*t-10)/2:(2-Math.pow(2,-20*t+10))/2;

E.InCirc=t=>1-Math.sqrt(1-t*t);
E.OutCirc=t=>Math.sqrt(1-(t-1)*(t-1));
E.InOutCirc=t=>t<.5?(1-Math.sqrt(1-(2*t)**2))/2:(Math.sqrt(1-(-2*t+2)**2)+1)/2;

E.InBack=t=>{const c=1.70158;return (c+1)*t*t*t-c*t*t};
E.OutBack=t=>{const c=1.70158;return 1+(c+1)*(t-1)**3+c*(t-1)**2};
E.InOutBack=t=>{const c=1.70158*1.525;return t<.5?((2*t)**2*((c+1)*2*t-c))/2:((2*t-2)**2*((c+1)*(t*2-2)+c)+2)/2};

E.InElastic=t=>t===0||t===1?t:-Math.pow(2,10*t-10)*Math.sin((t*10-10.75)*(2*Math.PI/3));
E.OutElastic=t=>t===0||t===1?t:Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI/3))+1;
E.InOutElastic=t=>t===0||t===1?t:t<.5?-(Math.pow(2,20*t-10)*Math.sin((20*t-11.125)*(2*Math.PI/4.5)))/2:(Math.pow(2,-20*t+10)*Math.sin((20*t-11.125)*(2*Math.PI/4.5)))/2+1;

E.OutBounce=t=>{
 const n=7.5625,d=2.75;
 if(t<1/d)return n*t*t;
 if(t<2/d)return n*(t-=1.5/d)*t+.75;
 if(t<2.5/d)return n*(t-=2.25/d)*t+.9375;
 return n*(t-=2.625/d)*t+.984375;
};
E.InBounce=t=>1-E.OutBounce(1-t);
E.InOutBounce=t=>t<.5?(1-E.OutBounce(1-2*t))/2:(1+E.OutBounce(2*t-1))/2;

function flash(t){
 const count=4;
 const step=Math.floor(t*count);
 const p=t*count-step;
 return step%2===0?p:1-p;
}
E.Flash=t=>flash(t);
E.InFlash=t=>t*flash(t);
E.OutFlash=t=>(1-t)*flash(t)+t;
E.InOutFlash=t=>t<.5?0.5*(t*2)*flash(t*2):0.5+0.5*((1-(t-.5)*2)*flash((t-.5)*2));

class View{
 constructor(canvas,fn){
  this.canvas=canvas;
  this.fn=fn;
 }

 draw(time){
  const ctx=this.canvas.getContext("2d");
  const w=this.canvas.width=this.canvas.offsetWidth;
  const h=this.canvas.height=this.canvas.offsetHeight;

  const pad=20;

  const size=Math.min(w-2*pad,h-2*pad);
  const left=pad;
  const bottom=h-pad;

  const minY=-DRAW_MARGIN;
  const maxY=1+DRAW_MARGIN;

  const mapX=t=>left+t*size;
  const mapY=v=>bottom-((v-minY)/(maxY-minY))*size;

  ctx.clearRect(0,0,w,h);

  /* GRID */
  ctx.strokeStyle="rgba(0,0,255,0.1)";
  ctx.beginPath();

  /* vertical lines (t: 0 → 1) */
  for(let i=0;i<=4;i++){
    const t=i/4;
    const x=mapX(t);
    ctx.moveTo(x, mapY(0));
    ctx.lineTo(x, mapY(1));
  }

  /* horizontal lines (x: 0 → 1) */
  for(let i=0;i<=4;i++){
    const v=i/4;
    const y=mapY(v);
    ctx.moveTo(mapX(0), y);
    ctx.lineTo(mapX(1), y);
  }

  ctx.stroke();



  /* AXES */
  ctx.strokeStyle="#333";
  ctx.beginPath();
  ctx.moveTo(mapX(0),mapY(0));
  ctx.lineTo(mapX(1),mapY(0));
  ctx.moveTo(mapX(0),mapY(0));
  ctx.lineTo(mapX(0),mapY(1));
  ctx.stroke();

  /* ARROWS */
  ctx.fillStyle="#333";

  let ax=mapX(1), ay=mapY(0);
  ctx.beginPath();
  ctx.moveTo(ax,ay);
  ctx.lineTo(ax-6,ay-3);
  ctx.lineTo(ax-6,ay+3);
  ctx.fill();

  let bx=mapX(0), by=mapY(1);
  ctx.beginPath();
  ctx.moveTo(bx,by);
  ctx.lineTo(bx-3,by+6);
  ctx.lineTo(bx+3,by+6);
  ctx.fill();

  /* LABELS */
  ctx.fillStyle="#333";
  ctx.font="10px sans-serif";

  ctx.fillText("0",mapX(0)-10,mapY(0)+12);
  ctx.fillText("1",mapX(1)-4,mapY(0)+12);
  ctx.fillText("1",mapX(0)-12,mapY(1)+3);

  ctx.fillText("t",mapX(1)+4,mapY(0)+4);
  ctx.fillText("x",mapX(0)-3,mapY(1)-6);
  
  /* CURVE */
  ctx.strokeStyle="#6c5ce7";
  ctx.beginPath();
  for(let i=0;i<=100;i++){
    const t=i/100;
    const x=mapX(t);
    const y=mapY(this.fn(t));
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  }
  ctx.stroke();

  /* ANIMATION */
  const dur=parseFloat(durationInput.value)||1;

  let tNorm;
  if(loopType==="loop"){
    tNorm=(time/dur)%1;
  }else{
    const c=(time/dur)%2;
    tNorm=c<1?c:2-c;
  }

  const v=this.fn(tNorm);

  const bx2=mapX(tNorm);
  const by2=mapY(v);

  ctx.fillStyle="#007bff";
  ctx.beginPath();
  ctx.arc(bx2,by2,4,0,Math.PI*2);
  ctx.fill();

  let x=mapX(0);
  let y=mapY(0);

  if(flags.move) y=mapY(v);

  let sizeSq=18;
  if(flags.scale) sizeSq*=0.5+Math.max(0,Math.min(1,v));

  let r=255,b=0;
  if(flags.color){
    const vv=Math.max(0,Math.min(1,v));
    r=255*(1-vv);
    b=255*vv;
  }

  ctx.save();
  ctx.translate(x,y);

  if(flags.rotate) ctx.rotate(v*Math.PI*2);

  ctx.fillStyle=`rgb(${r},0,${b})`;
  ctx.fillRect(-sizeSq/2,-sizeSq/2,sizeSq,sizeSq);

  ctx.restore();
 }
}

const grid=document.getElementById("grid");
const views=[];

Object.entries(E).forEach(([name,fn],i)=>{
 const card=document.createElement("div");
 card.className="card";

 const canvas=document.createElement("canvas");
 const label=document.createElement("div");

label.innerHTML = `<span class="num">${i+1}.</span> ${name}`;

 card.appendChild(canvas);
 card.appendChild(label);
 grid.appendChild(card);

 views.push(new View(canvas,fn));
});

let flags={move:true,scale:false,rotate:false,color:false};
let loopType="loop";

let start=performance.now();

function animate(now){
 const t=(now-start)/1000;
 views.forEach(v=>v.draw(t));
 requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

function toggle(btn,key){
 flags[key]=!flags[key];
 btn.classList.toggle("active",flags[key]);
}

moveBtn.onclick=()=>toggle(moveBtn,"move");
scaleBtn.onclick=()=>toggle(scaleBtn,"scale");
rotateBtn.onclick=()=>toggle(rotateBtn,"rotate");
colorBtn.onclick=()=>toggle(colorBtn,"color");

function setDuration(v){
 durationInput.value=v;
}

loopBtn.onclick=()=>{
 loopType="loop";
 loopBtn.classList.add("active");
 pingBtn.classList.remove("active");
};

pingBtn.onclick=()=>{
 loopType="ping";
 pingBtn.classList.add("active");
 loopBtn.classList.remove("active");
};
</script>

</body>
</html>
