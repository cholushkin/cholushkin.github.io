<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easings</title>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 40px;
}

h1 { margin-bottom: 20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 12px;
}

canvas {
  width: 100%;
  height: 140px;
}

.name {
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
}

.controls {
  margin-top: 30px;
  padding: 16px;
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  cursor: pointer;
}

button.active {
  background: #6c5ce7;
  color: white;
}
</style>
</head>

<body>

<h1>Easing Functions</h1>
<div class="grid" id="grid"></div>

<div class="controls">
  <div>
    <strong>Visualization:</strong>
    <button id="moveBtn" class="active">Move</button>
    <button id="scaleBtn">Scale</button>
    <button id="rotateBtn">Rotate</button>
    <button id="colorBtn">Color</button>
  </div>

  <div>
    <strong>Duration:</strong>
    <input type="range" id="duration" min="0.5" max="3" step="0.1" value="1.5">
    <span id="durationLabel">1.5s</span>
  </div>

  <div>
    <strong>Loop:</strong>
    <button id="loopBtn" class="active">Loop</button>
    <button id="pingBtn">Ping-Pong</button>
  </div>
</div>

<script>
const DRAW_MARGIN = 0.2; // 🔥 tweak this

/* ---------- Easings ---------- */
const E = {};

/* basic */
E.Linear = t=>t;

/* sine */
E.InSine = t=>1-Math.cos(t*Math.PI/2);
E.OutSine = t=>Math.sin(t*Math.PI/2);
E.InOutSine = t=>-(Math.cos(Math.PI*t)-1)/2;

/* quad */
E.InQuad=t=>t*t;
E.OutQuad=t=>t*(2-t);
E.InOutQuad=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

/* cubic */
E.InCubic=t=>t*t*t;
E.OutCubic=t=>1-Math.pow(1-t,3);
E.InOutCubic=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

/* quart */
E.InQuart=t=>t*t*t*t;
E.OutQuart=t=>1-Math.pow(1-t,4);
E.InOutQuart=t=>t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;

/* quint */
E.InQuint=t=>t*t*t*t*t;
E.OutQuint=t=>1-Math.pow(1-t,5);
E.InOutQuint=t=>t<.5?16*t*t*t*t*t:1-Math.pow(-2*t+2,5)/2;

/* expo */
E.InExpo=t=>t===0?0:Math.pow(2,10*t-10);
E.OutExpo=t=>t===1?1:1-Math.pow(2,-10*t);
E.InOutExpo=t=>t===0?0:t===1?1:t<.5?Math.pow(2,20*t-10)/2:(2-Math.pow(2,-20*t+10))/2;

/* circ */
E.InCirc=t=>1-Math.sqrt(1-t*t);
E.OutCirc=t=>Math.sqrt(1-(t-1)*(t-1));
E.InOutCirc=t=>t<.5?(1-Math.sqrt(1-(2*t)**2))/2:(Math.sqrt(1-(-2*t+2)**2)+1)/2;

/* back */
E.InBack=t=>{const c=1.70158;return (c+1)*t*t*t-c*t*t};
E.OutBack=t=>{const c=1.70158;return 1+(c+1)*(t-1)**3+c*(t-1)**2};
E.InOutBack=t=>{
 const c=1.70158*1.525;
 return t<.5?( (2*t)**2*((c+1)*2*t-c) )/2
             :( (2*t-2)**2*((c+1)*(t*2-2)+c)+2 )/2;
};

/* elastic */
E.InElastic=t=>{
 if(t===0||t===1)return t;
 return -Math.pow(2,10*t-10)*Math.sin((t*10-10.75)*(2*Math.PI/3));
};
E.OutElastic=t=>{
 if(t===0||t===1)return t;
 return Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI/3))+1;
};
E.InOutElastic=t=>{
 if(t===0||t===1)return t;
 return t<.5
 ?-(Math.pow(2,20*t-10)*Math.sin((20*t-11.125)*(2*Math.PI/4.5)))/2
 :(Math.pow(2,-20*t+10)*Math.sin((20*t-11.125)*(2*Math.PI/4.5)))/2+1;
};

/* bounce */
E.OutBounce=t=>{
 const n=7.5625,d=2.75;
 if(t<1/d)return n*t*t;
 if(t<2/d)return n*(t-=1.5/d)*t+.75;
 if(t<2.5/d)return n*(t-=2.25/d)*t+.9375;
 return n*(t-=2.625/d)*t+.984375;
};
E.InBounce=t=>1-E.OutBounce(1-t);
E.InOutBounce=t=>t<.5?(1-E.OutBounce(1-2*t))/2:(1+E.OutBounce(2*t-1))/2;

/* flash */
function flashCore(t,c=3,p=1){
 if(t===0||t===1)return t;
 const step=Math.floor(t*c);
 const prog=t*c-step;
 const dir=step%2? -1:1;
 return dir>0?Math.pow(prog,p):1-Math.pow(prog,p);
}
E.Flash=t=>flashCore(t);
E.InFlash=t=>t*flashCore(t);
E.OutFlash=t=>(1-t)*flashCore(t)+t;
E.InOutFlash=t=>t<.5?0.5*(t*2)*flashCore(t*2):0.5+0.5*((1-(t-.5)*2)*flashCore((t-.5)*2));

/* ---------- CLASS ---------- */
class EasingView {
  constructor(canvas, fn) {
    this.canvas = canvas;
    this.fn = fn;
  }

  draw(time) {
    const ctx = this.canvas.getContext("2d");
    const w = this.canvas.width = this.canvas.offsetWidth;
    const h = this.canvas.height = this.canvas.offsetHeight;

    const pad = 20;
    const range = h - 2*pad;
    const minY = -DRAW_MARGIN;
    const maxY = 1 + DRAW_MARGIN;

    const mapY = v =>
      h - pad - ((v - minY) / (maxY - minY)) * range;

    ctx.clearRect(0,0,w,h);

    /* curve */
    ctx.strokeStyle="#6c5ce7";
    ctx.beginPath();
    for(let i=0;i<=100;i++){
      const t=i/100;
      const x=pad+t*(w-2*pad);
      const y=mapY(this.fn(t));
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.stroke();

    /* time */
    let tNorm;
    if(loopType==="loop"){
      tNorm=(time/duration)%1;
    } else {
      const c=(time/duration)%2;
      tNorm=c<1?c:2-c;
    }

    const v=this.fn(tNorm);

    /* BLUE DOT */
    const bx=pad+tNorm*(w-2*pad);
    const by=mapY(v);
    ctx.fillStyle="#007bff";
    ctx.beginPath();
    ctx.arc(bx,by,4,0,Math.PI*2);
    ctx.fill();

    /* RED SQUARE */
    let x=pad;
    let y=h-pad;

    if(flags.move){
      x=pad+tNorm*(w-2*pad);
    }

    let size=18;
    if(flags.scale) size*=0.5+v;

    let r=255,g=0,b=0;
    if(flags.color){
      r=255*(1-v);
      b=255*v;
    }

    ctx.save();
    ctx.translate(x,y);

    if(flags.rotate){
      ctx.rotate(tNorm*Math.PI*2);
    }

    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(-size/2,-size/2,size,size);
    ctx.restore();
  }
}

/* ---------- INIT ---------- */
const grid=document.getElementById("grid");
const views=[];

Object.entries(E).forEach(([name,fn])=>{
  const card=document.createElement("div");
  card.className="card";

  const canvas=document.createElement("canvas");
  const label=document.createElement("div");

  label.className="name";
  label.textContent=name;

  card.appendChild(canvas);
  card.appendChild(label);
  grid.appendChild(card);

  views.push(new EasingView(canvas,fn));
});

/* ---------- STATE ---------- */
let flags={move:true,scale:false,rotate:false,color:false};
let duration=1.5;
let loopType="loop";

/* ---------- LOOP ---------- */
let start=performance.now();

function animate(now){
  const t=(now-start)/1000;
  views.forEach(v=>v.draw(t));
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ---------- UI ---------- */
function toggle(btn,key){
  flags[key]=!flags[key];
  btn.classList.toggle("active",flags[key]);
}

moveBtn.onclick=()=>toggle(moveBtn,"move");
scaleBtn.onclick=()=>toggle(scaleBtn,"scale");
rotateBtn.onclick=()=>toggle(rotateBtn,"rotate");
colorBtn.onclick=()=>toggle(colorBtn,"color");

duration.oninput=e=>{
  duration=parseFloat(e.target.value);
  durationLabel.textContent=duration.toFixed(1)+"s";
};

loopBtn.onclick=()=>{
  loopType="loop";
  loopBtn.classList.add("active");
  pingBtn.classList.remove("active");
};

pingBtn.onclick=()=>{
  loopType="ping";
  pingBtn.classList.add("active");
  loopBtn.classList.remove("active");
};
</script>

</body>
</html>
