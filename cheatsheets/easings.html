<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easings</title>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 30px;
}

h1 {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 12px;
}

canvas {
  width: 100%;
  height: 140px;
}

.name {
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
}

.controls {
  margin-top: 30px;
  padding: 16px;
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  cursor: pointer;
}

button.active {
  background: #6c5ce7;
  color: white;
}

.legend {
  margin-top: 30px;
  font-size: 13px;
  display: flex;
  gap: 20px;
  align-items: center;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.square {
  width: 10px;
  height: 10px;
  display: inline-block;
}
</style>
</head>

<body>

<h1>Easing Functions (35) Cheatsheet</h1>

<div class="grid" id="grid"></div>

<div class="controls">
  <div>
    <strong>Visualization:</strong>
    <button id="moveBtn" class="active">Move</button>
    <button id="scaleBtn">Scale</button>
    <button id="rotateBtn">Rotate</button>
    <button id="colorBtn">Color</button>
  </div>

  <div>
    <strong>Duration:</strong>
    <input type="range" id="duration" min="0.5" max="3" step="0.1" value="1.5">
    <span id="durationLabel">1.5s</span>
  </div>

  <div>
    <strong>Loop:</strong>
    <button id="loopBtn" class="active">Loop</button>
    <button id="pingBtn">Ping-Pong</button>
  </div>
</div>

<div class="legend">
  <span><span class="dot" style="background:#007bff;"></span> Curve evaluation</span>
  <span><span class="square" style="background:red;"></span> Animated object</span>
  <span>Axes: t (time), x (value)</span>
</div>

<script>
const DRAW_MARGIN = 0.25;

/* ---------- Easings (same as before, unchanged) ---------- */
const E = {};
// (omitted here for brevity — keep your full easing block exactly as before)

/* ---------- CLASS ---------- */
class EasingView {
  constructor(canvas, fn) {
    this.canvas = canvas;
    this.fn = fn;
  }

  draw(time) {
    const ctx = this.canvas.getContext("2d");
    const w = this.canvas.width = this.canvas.offsetWidth;
    const h = this.canvas.height = this.canvas.offsetHeight;

    const pad = 20;

    const minY = -DRAW_MARGIN;
    const maxY = 1 + DRAW_MARGIN;

    const mapY = v =>
      h - pad - ((v - minY) / (maxY - minY)) * (h - 2 * pad);

    ctx.clearRect(0,0,w,h);

    /* ---------- AXES ---------- */
    ctx.strokeStyle = "#bbb";
    ctx.lineWidth = 1;

    // X axis
    ctx.beginPath();
    ctx.moveTo(pad, h - pad);
    ctx.lineTo(w - pad, h - pad);
    ctx.stroke();

    // Y axis
    ctx.beginPath();
    ctx.moveTo(pad, h - pad);
    ctx.lineTo(pad, pad);
    ctx.stroke();

    ctx.fillStyle = "#666";
    ctx.font = "10px sans-serif";

    ctx.fillText("0", pad - 10, h - pad + 10);
    ctx.fillText("1", pad - 10, pad);
    ctx.fillText("1", w - pad, h - pad + 10);

    ctx.fillText("t", w - pad + 5, h - pad + 10);
    ctx.fillText("x", pad - 10, pad - 5);

    /* ---------- CURVE ---------- */
    ctx.strokeStyle = "#6c5ce7";
    ctx.beginPath();

    for (let i=0;i<=100;i++) {
      const t=i/100;
      const x=pad+t*(w-2*pad);
      const y=mapY(this.fn(t));
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }

    ctx.stroke();

    /* ---------- TIME ---------- */
    let tNorm;

    if (loopType === "loop") {
      tNorm = (time / duration) % 1;
    } else {
      const c = (time / duration) % 2;
      tNorm = c < 1 ? c : 2 - c;
    }

    const v = this.fn(tNorm);

    /* ---------- BLUE DOT ---------- */
    const bx = pad + tNorm*(w-2*pad);
    const by = mapY(v);

    ctx.fillStyle="#007bff";
    ctx.beginPath();
    ctx.arc(bx,by,4,0,Math.PI*2);
    ctx.fill();

    /* ---------- RED SQUARE ---------- */
    let x = pad;
    let y = h - pad;

    if (flags.move) {
      y = mapY(v); // ✅ vertical movement
    }

    let size = 18;
    if (flags.scale) size *= (0.5 + Math.max(0, Math.min(1, v)));

    let r=255,g=0,b=0;

    if (flags.color) {
      const vv = Math.max(0, Math.min(1, v)); // clamp
      r = 255*(1-vv);
      b = 255*vv;
    }

    ctx.save();
    ctx.translate(x,y);

    if (flags.rotate) {
      ctx.rotate(v * Math.PI * 2); // ✅ FIXED
    }

    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(-size/2,-size/2,size,size);

    ctx.restore();
  }
}

/* ---------- INIT ---------- */
const grid = document.getElementById("grid");
const views = [];

Object.entries(E).forEach(([name,fn])=>{
  const card=document.createElement("div");
  card.className="card";

  const canvas=document.createElement("canvas");
  const label=document.createElement("div");

  label.className="name";
  label.textContent=name;

  card.appendChild(canvas);
  card.appendChild(label);
  grid.appendChild(card);

  views.push(new EasingView(canvas,fn));
});

/* ---------- STATE ---------- */
let flags = {move:true,scale:false,rotate:false,color:false};
let duration = 1.5;
let loopType = "loop";

/* ---------- LOOP ---------- */
let start = performance.now();

function animate(now){
  const time = (now - start) / 1000;

  views.forEach(v=>v.draw(time));

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ---------- UI ---------- */
function toggle(btn,key){
  flags[key]=!flags[key];
  btn.classList.toggle("active",flags[key]);
}

moveBtn.onclick=()=>toggle(moveBtn,"move");
scaleBtn.onclick=()=>toggle(scaleBtn,"scale");
rotateBtn.onclick=()=>toggle(rotateBtn,"rotate");
colorBtn.onclick=()=>toggle(colorBtn,"color");

duration.oninput=e=>{
  duration=parseFloat(e.target.value);
  durationLabel.textContent=duration.toFixed(1)+"s";
};

loopBtn.onclick=()=>{
  loopType="loop";
  loopBtn.classList.add("active");
  pingBtn.classList.remove("active");
};

pingBtn.onclick=()=>{
  loopType="ping";
  pingBtn.classList.add("active");
  loopBtn.classList.remove("active");
};
</script>

</body>
</html>
