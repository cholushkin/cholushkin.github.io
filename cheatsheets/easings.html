<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easings</title>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 30px;
}

h1 { margin-bottom: 20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 12px;
}

canvas {
  width: 100%;
  height: 140px;
}

.name {
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
}

.controls {
  margin-top: 30px;
  padding: 16px;
  background: white;
  border: 1px solid #eee;
  border-radius: 10px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

button {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #f5f5f5;
  cursor: pointer;
}

button.active {
  background: #6c5ce7;
  color: white;
}

.legend {
  margin-top: 20px;
  font-size: 13px;
}
</style>
</head>

<body>

<h1>Easing Functions (35) Cheatsheet</h1>

<div class="grid" id="grid"></div>

<div class="controls">
  <div>
    <strong>Visualization:</strong>
    <button id="moveBtn" class="active">Move</button>
    <button id="scaleBtn">Scale</button>
    <button id="rotateBtn">Rotate</button>
    <button id="colorBtn">Color</button>
  </div>

  <div>
    <strong>Duration:</strong>
    <input type="range" id="duration" min="0.5" max="3" step="0.1" value="1.5">
    <span id="durationLabel">1.5s</span>
  </div>

  <div>
    <strong>Loop:</strong>
    <button id="loopBtn" class="active">Loop</button>
    <button id="pingBtn">Ping-Pong</button>
  </div>
</div>

<div class="legend">
🔵 Curve evaluation &nbsp;&nbsp;
🔴 Animated object &nbsp;&nbsp;
Axes: t (time), x (value)
</div>

<script>
const DRAW_MARGIN = 0.25;

/* ========= EASINGS ========= */
const E = {
  Linear: t => t,

  InSine: t => 1 - Math.cos(t * Math.PI / 2),
  OutSine: t => Math.sin(t * Math.PI / 2),
  InOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,

  InQuad: t => t*t,
  OutQuad: t => t*(2-t),
  InOutQuad: t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2,

  InCubic: t => t*t*t,
  OutCubic: t => 1-Math.pow(1-t,3),
  InOutCubic: t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,

  InQuart: t => t*t*t*t,
  OutQuart: t => 1-Math.pow(1-t,4),
  InOutQuart: t => t<.5 ? 8*t*t*t*t : 1-Math.pow(-2*t+2,4)/2,

  InQuint: t => t*t*t*t*t,
  OutQuint: t => 1-Math.pow(1-t,5),
  InOutQuint: t => t<.5 ? 16*t*t*t*t*t : 1-Math.pow(-2*t+2,5)/2,

  InExpo: t => t===0?0:Math.pow(2,10*t-10),
  OutExpo: t => t===1?1:1-Math.pow(2,-10*t),
  InOutExpo: t =>
    t===0?0:t===1?1:
    t<.5?Math.pow(2,20*t-10)/2:(2-Math.pow(2,-20*t+10))/2,

  InCirc: t => 1-Math.sqrt(1-t*t),
  OutCirc: t => Math.sqrt(1-(t-1)*(t-1)),
  InOutCirc: t =>
    t<.5?(1-Math.sqrt(1-(2*t)**2))/2:
    (Math.sqrt(1-(-2*t+2)**2)+1)/2,

  InBack: t => { const c=1.70158; return (c+1)*t*t*t - c*t*t; },
  OutBack: t => { const c=1.70158; return 1+(c+1)*(t-1)**3 + c*(t-1)**2; },
  InOutBack: t => {
    const c=1.70158*1.525;
    return t<.5
      ? ((2*t)**2*((c+1)*2*t-c))/2
      : ((2*t-2)**2*((c+1)*(t*2-2)+c)+2)/2;
  },

  InElastic: t =>
    t===0||t===1 ? t :
    -Math.pow(2,10*t-10)*Math.sin((t*10-10.75)*(2*Math.PI/3)),

  OutElastic: t =>
    t===0||t===1 ? t :
    Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1,

  InOutElastic: t =>
    t===0||t===1 ? t :
    t<.5
      ? -(Math.pow(2,20*t-10)*Math.sin((20*t-11.125)*(2*Math.PI/4.5)))/2
      : (Math.pow(2,-20*t+10)*Math.sin((20*t-11.125)*(2*Math.PI/4.5)))/2+1,

  OutBounce: t => {
    const n=7.5625,d=2.75;
    if(t<1/d) return n*t*t;
    if(t<2/d) return n*(t-=1.5/d)*t+0.75;
    if(t<2.5/d) return n*(t-=2.25/d)*t+0.9375;
    return n*(t-=2.625/d)*t+0.984375;
  },

  InBounce: t => 1 - E.OutBounce(1 - t),

  InOutBounce: t =>
    t<.5
      ? (1-E.OutBounce(1-2*t))/2
      : (1+E.OutBounce(2*t-1))/2
};

/* ========= CLASS ========= */
class View {
  constructor(canvas, fn){
    this.canvas=canvas;
    this.fn=fn;
  }

  draw(time){
    const ctx=this.canvas.getContext("2d");
    const w=this.canvas.width=this.canvas.offsetWidth;
    const h=this.canvas.height=this.canvas.offsetHeight;

    const pad=20;

    const minY=-DRAW_MARGIN;
    const maxY=1+DRAW_MARGIN;

    const mapY=v=>h-pad-((v-minY)/(maxY-minY))*(h-2*pad);

    ctx.clearRect(0,0,w,h);

    /* axes */
    ctx.strokeStyle="#bbb";
    ctx.beginPath();
    ctx.moveTo(pad,h-pad);
    ctx.lineTo(w-pad,h-pad);
    ctx.moveTo(pad,h-pad);
    ctx.lineTo(pad,pad);
    ctx.stroke();

    ctx.fillStyle="#666";
    ctx.font="10px sans-serif";
    ctx.fillText("0",pad-10,h-pad+10);
    ctx.fillText("1",pad-10,pad);
    ctx.fillText("1",w-pad,h-pad+10);
    ctx.fillText("t",w-pad+5,h-pad+10);
    ctx.fillText("x",pad-10,pad-5);

    /* curve */
    ctx.strokeStyle="#6c5ce7";
    ctx.beginPath();
    for(let i=0;i<=100;i++){
      const t=i/100;
      const x=pad+t*(w-2*pad);
      const y=mapY(this.fn(t));
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.stroke();

    /* time */
    let tNorm;
    if(loopType==="loop"){
      tNorm=(time/duration)%1;
    }else{
      const c=(time/duration)%2;
      tNorm=c<1?c:2-c;
    }

    const v=this.fn(tNorm);

    /* blue dot */
    const bx=pad+tNorm*(w-2*pad);
    const by=mapY(v);
    ctx.fillStyle="#007bff";
    ctx.beginPath();
    ctx.arc(bx,by,4,0,Math.PI*2);
    ctx.fill();

    /* square */
    let x=pad;
    let y=h-pad;

    if(flags.move){
      y=mapY(v);
    }

    let size=18;
    if(flags.scale) size*=0.5+Math.max(0,Math.min(1,v));

    let r=255,b=0;
    if(flags.color){
      const vv=Math.max(0,Math.min(1,v));
      r=255*(1-vv);
      b=255*vv;
    }

    ctx.save();
    ctx.translate(x,y);

    if(flags.rotate){
      ctx.rotate(v*Math.PI*2);
    }

    ctx.fillStyle=`rgb(${r},0,${b})`;
    ctx.fillRect(-size/2,-size/2,size,size);
    ctx.restore();
  }
}

/* init */
const grid=document.getElementById("grid");
const views=[];

Object.entries(E).forEach(([n,f])=>{
  const card=document.createElement("div");
  card.className="card";

  const canvas=document.createElement("canvas");
  const label=document.createElement("div");

  label.className="name";
  label.textContent=n;

  card.appendChild(canvas);
  card.appendChild(label);
  grid.appendChild(card);

  views.push(new View(canvas,f));
});

/* state */
let flags={move:true,scale:false,rotate:false,color:false};
let duration=1.5;
let loopType="loop";

/* loop */
let start=performance.now();

function animate(now){
  const t=(now-start)/1000;
  views.forEach(v=>v.draw(t));
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* controls */
function toggle(btn,key){
  flags[key]=!flags[key];
  btn.classList.toggle("active",flags[key]);
}

moveBtn.onclick=()=>toggle(moveBtn,"move");
scaleBtn.onclick=()=>toggle(scaleBtn,"scale");
rotateBtn.onclick=()=>toggle(rotateBtn,"rotate");
colorBtn.onclick=()=>toggle(colorBtn,"color");

duration.oninput=e=>{
  duration=parseFloat(e.target.value);
  durationLabel.textContent=duration.toFixed(1)+"s";
};

loopBtn.onclick=()=>{
  loopType="loop";
  loopBtn.classList.add("active");
  pingBtn.classList.remove("active");
};

pingBtn.onclick=()=>{
  loopType="ping";
  pingBtn.classList.add("active");
  loopBtn.classList.remove("active");
};
</script>

</body>
</html>
