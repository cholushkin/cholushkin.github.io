---
layout: default
title: Home
---

<h1>📰 Blog</h1>

<div id="filters" style="margin-bottom: 20px;">
  <button onclick="setCategory(null)" id="filter-all">All</button>
  <button onclick="setCategory('thoughts')" id="filter-thoughts">Thoughts</button>
  <button onclick="setCategory('projects')" id="filter-projects">Projects</button>
</div>

<div id="posts"></div>

<button id="loadMore" onclick="loadMore()" style="margin-top:20px;">
  Load more
</button>

<script>
const posts = [
  {% for post in site.posts %}
  {
    title: {{ post.title | jsonify }},
    url: "{{ post.url }}",
    date: "{{ post.date | date: "%Y-%m-%d" }}",
    categories: {{ post.categories | jsonify }},
    excerpt: {{ post.content
      | split: '<!--more-->'
      | first
      | markdownify
      | truncate: 200
      | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];
</script>

<script>
let visibleCount = 10;
let currentCategory = null;

function setActiveButton() {
  const buttons = document.querySelectorAll("#filters button");

  buttons.forEach(btn => btn.classList.remove("active"));

  if (!currentCategory) {
    document.getElementById("filter-all").classList.add("active");
  } else {
    const btn = document.getElementById("filter-" + currentCategory);
    if (btn) btn.classList.add("active");
  }
}

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let filtered = posts;

  if (currentCategory) {
    filtered = posts.filter(p => p.categories.includes(currentCategory));
  }

  const visible = filtered.slice(0, visibleCount);

  visible.forEach(post => {
    const el = document.createElement("div");

    el.style.border = "1px solid #eee";
    el.style.padding = "16px";
    el.style.marginBottom = "12px";
    el.style.borderRadius = "10px";
    el.style.background = "white";
    el.style.cursor = "pointer";

    el.onclick = () => {
      window.location.href = post.url;
    };

	el.innerHTML = `
	  <h3 style="margin:0 0 6px 0;">${post.title}</h3>
	  <small style="color:#666;">${post.date}</small>

	  <div style="margin:10px 0; color:#333;">
		${post.excerpt}
	  </div>

	  <div style="text-align:center; margin:10px 0; font-weight:500;">
		Read post →
	  </div>

	  <div style="font-size:12px; color:#777;">
		${post.categories.map(c => `#${c}`).join(" ")}
	  </div>
	`;

    container.appendChild(el);
  });

  document.getElementById("loadMore").style.display =
    visible.length < filtered.length ? "block" : "none";

  setActiveButton();
}

function loadMore() {
  visibleCount += 10;
  renderPosts();
}

function setCategory(cat) {
  currentCategory = cat;
  visibleCount = 10;
  renderPosts();
}

renderPosts();
</script>
