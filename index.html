---
layout: default
title: Home
---

<h1>📰 Blog</h1>

<div id="filters" style="margin-bottom: 20px;">
  <button onclick="setCategory(null)">All</button>
  <button onclick="setCategory('thoughts')">Thoughts</button>
  <button onclick="setCategory('projects')">Projects</button>
</div>

<div id="posts"></div>

<button id="loadMore" onclick="loadMore()" style="margin-top:20px;">
  Load more
</button>

<!-- Jekyll → JS -->
<script>
const posts = [
  {% for post in site.posts %}
  {
    title: {{ post.title | jsonify }},
    url: "{{ post.url }}",
    date: "{{ post.date | date: "%Y-%m-%d" }}",
    categories: {{ post.categories | jsonify }},
    excerpt: {{ post.content 
      | split: '<!--more-->' 
      | first 
      | strip_html 
      | strip_newlines 
      | truncate: 160 
      | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];
</script>

<!-- UI logic -->
<script>
let visibleCount = 10;
let currentCategory = null;

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let filtered = posts;

  if (currentCategory) {
    filtered = posts.filter(p => p.categories.includes(currentCategory));
  }

  const visible = filtered.slice(0, visibleCount);

  visible.forEach(post => {
    const el = document.createElement("div");

    el.style.border = "1px solid #eee";
    el.style.padding = "16px";
    el.style.marginBottom = "12px";
    el.style.borderRadius = "10px";
    el.style.background = "white";

    el.innerHTML = `
      <a href="${post.url}" style="text-decoration:none;">
        <h3 style="margin:0 0 6px 0;">${post.title}</h3>
      </a>

      <small style="color:#666;">${post.date}</small>

      <p style="margin:10px 0;">
        ${post.excerpt}
      </p>

      <div>
        ${post.categories.map(c => `
          <a href="#" onclick="setCategory('${c}')" style="margin-right:6px; font-size:12px;">
            #${c}
          </a>
        `).join("")}
      </div>
    `;

    container.appendChild(el);
  });

  document.getElementById("loadMore").style.display =
    visible.length < filtered.length ? "block" : "none";
}

function loadMore() {
  visibleCount += 10;
  renderPosts();
}

function setCategory(cat) {
  currentCategory = cat;
  visibleCount = 10;
  renderPosts();
}

// initial render
renderPosts();
</script>
