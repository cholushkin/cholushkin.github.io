---
layout: default
title: Home
---

<h1>📰 Blog</h1>

<div id="filters" style="margin-bottom: 20px;">
  <button onclick="setCategory(null)">All</button>
  <button onclick="setCategory('thoughts')">Thoughts</button>
  <button onclick="setCategory('projects')">Projects</button>
</div>

<div id="posts"></div>

<button id="loadMore" onclick="loadMore()" style="margin-top:20px;">
  Load more
</button>

<!-- Jekyll → JS data -->
<script>
  const posts = [
    {% for post in site.posts %}
      {
        title: "{{ post.title }}",
        url: "{{ post.url }}",
        date: "{{ post.date | date: "%Y-%m-%d" }}",
        categories: {{ post.categories | jsonify }},
        excerpt: "{{ post.excerpt | strip_newlines | escape }}"
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>

<!-- App logic -->
<script>
let visibleCount = 10;
let currentCategory = null;

function renderPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let filtered = posts;

  if (currentCategory) {
    filtered = posts.filter(p => p.categories.includes(currentCategory));
  }

  const visible = filtered.slice(0, visibleCount);

  visible.forEach(post => {
    const el = document.createElement("div");
    el.style.border = "1px solid #eee";
    el.style.padding = "12px";
    el.style.marginBottom = "12px";
    el.style.borderRadius = "8px";
    el.style.background = "white";

    el.innerHTML = `
      <a href="${post.url}"><strong>${post.title}</strong></a><br>
      <small>${post.date}</small><br>
      <p>${post.excerpt}</p>
      ${post.categories.map(c => `<small>#${c}</small>`).join(" ")}
    `;

    container.appendChild(el);
  });

  document.getElementById("loadMore").style.display =
    visible.length < filtered.length ? "block" : "none";
}

function loadMore() {
  visibleCount += 10;
  renderPosts();
}

function setCategory(cat) {
  currentCategory = cat;
  visibleCount = 10;
  renderPosts();
}

// initial render
renderPosts();
</script>
